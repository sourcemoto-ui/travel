<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🇰🇷 韓國行程表 (單機/API版)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Confetti & Html2Canvas -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <style>
        /* 隱藏捲軸但保留滾動功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 拖曳時的視覺回饋 */
        .dragging { opacity: 0.5; border: 2px dashed #6366f1; }
        
        /* 避免手機雙擊放大 */
        button, input { touch-action: manipulation; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 font-sans text-slate-800 dark:text-slate-200 transition-colors duration-300 pb-20 select-none md:select-auto">

    <!-- Toast 通知容器 -->
    <div id="toast-container" class="fixed top-20 left-1/2 -translate-x-1/2 z-[100] transition-all duration-300 opacity-0 pointer-events-none">
        <div id="toast-msg" class="bg-slate-800 dark:bg-indigo-500 text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl whitespace-nowrap flex items-center gap-2">
            通知訊息
        </div>
    </div>

    <div id="app-root">
        <!-- 內容將由 JS 動態渲染 -->
    </div>

<script>
// ==========================================
// 1. 全域變數與初始設定
// ==========================================
const API_KEY = ""; // 填入你的 Gemini API Key
const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";
const DEFAULT_API_URL = "https://script.google.com/macros/s/AKfycbzNOXgR5ek-zBYweuAXFFkqVtJFwY2lSdLUxvwLaLwbkD-QFqBMN5lsoxjNFS18HOzG/exec";
const LOCAL_STORAGE_KEY = "korea_trip_data_html_v1";

const INITIAL_DAYS = [
  { id: '2026-03-17', label: '3/17 (二) 抵達與明洞', events: [
    { id: 'e1', arrivalTime: '14:00', duration: 60, transitToNext: 40, transitMode: 'train', cost: 11000, title: '抵達仁川機場 (ICN)', titleKr: '인천국제공항', type: '景點', location: '仁川國際機場', isChecked: false, isPinned: false, notes: '搭乘AREX前往市區' },
    { id: 'e3', arrivalTime: '18:00', duration: 90, transitToNext: 15, transitMode: 'walk', cost: 24000, title: '明洞餃子', titleKr: '명동교자', type: '餐廳', location: '首爾特別市中區明洞10街29', isChecked: false, isPinned: true, notes: '米其林推薦' },
    { id: 'e4', arrivalTime: '19:45', duration: 120, transitToNext: 0, transitMode: 'walk', cost: 50000, title: '明洞商圈逛街', titleKr: '명동거리', type: '景點', location: '明洞', isChecked: false, isPinned: false, notes: '換錢與美妝' },
  ]}
];

// App 狀態中心
const state = {
    days: [],
    backups: [],
    activeDayId: null,
    isDarkMode: false,
    aiQuery: '',
    aiSuggestions: [],
    isAiLoading: false,
    showIntegrationModal: false,
    showBackupMenu: false,
    sheetsApiUrl: localStorage.getItem('korea_trip_api_url') || DEFAULT_API_URL,
    syncStatus: 'idle', // idle, saving, synced, error
    view: 'itinerary', // itinerary, details
    selectedEvent: null,
    analysisContent: '',
    isDetailLoading: false,
    draggedEventId: null
};

// ==========================================
// 2. 工具函式
// ==========================================
const escapeHTML = (str) => String(str).replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag]));
const generateId = () => Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
const formatTime24 = (h, m) => `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;

const addMinutes = (time, mins) => {
  if (!time || typeof String(time) !== 'string') return "00:00";
  const parts = String(time).split(':');
  const h = parseInt(parts[0], 10) || 0;
  const m = parseInt(parts[1], 10) || 0;
  const date = new Date();
  date.setHours(h, m + (Number(mins) || 0));
  const outH = date.getHours();
  const outM = date.getMinutes();
  if (isNaN(outH) || isNaN(outM)) return "00:00";
  return formatTime24(outH, outM);
};

const getTypeColor = (type) => {
  switch(type) {
    case '景點': return 'bg-blue-100 text-blue-700 border-blue-200 dark:bg-blue-900/30 dark:text-blue-300 dark:border-blue-800';
    case '餐廳': return 'bg-orange-100 text-orange-700 border-orange-200 dark:bg-orange-900/30 dark:text-orange-300 dark:border-orange-800';
    case '小吃': return 'bg-pink-100 text-pink-700 border-pink-200 dark:bg-pink-900/30 dark:text-pink-300 dark:border-pink-800';
    default: return 'bg-slate-100 text-slate-700 border-slate-200 dark:bg-slate-800 dark:text-slate-300 dark:border-slate-700';
  }
};

const getTransitIcon = (mode) => {
    switch(mode) {
      case 'bus': return 'bus';
      case 'car': return 'car';
      case 'walk': return 'footprints';
      default: return 'train-front';
    }
};

const getMockWeather = (dateString) => {
  const dateNum = parseInt(dateString.replace(/\D/g, '')) || 0;
  const isSunny = dateNum % 3 !== 0;
  return {
    temp: 15 + (dateNum % 10),
    condition: isSunny ? 'Sunny' : 'Rainy',
    icon: isSunny ? 'sun-medium' : 'cloud-rain',
    color: isSunny ? 'text-amber-500' : 'text-blue-400'
  };
};

const showToast = (msg) => {
    const container = document.getElementById('toast-container');
    const msgEl = document.getElementById('toast-msg');
    msgEl.innerHTML = escapeHTML(msg);
    container.classList.remove('opacity-0', 'pointer-events-none');
    container.classList.add('opacity-100', '-translate-y-4');
    setTimeout(() => {
        container.classList.remove('opacity-100', '-translate-y-4');
        container.classList.add('opacity-0', 'pointer-events-none');
    }, 3500);
};

const sanitizeEvents = (events) => {
  if (!Array.isArray(events)) return [];
  const map = new Map();
  events.forEach(e => { 
    if (e && e.id) {
      let newE = { ...e }; 
      if (typeof newE.arrivalTime === 'string' && newE.arrivalTime.includes('T')) {
          try {
             const dateObj = new Date(newE.arrivalTime);
             if (!isNaN(dateObj.getTime())) {
                newE.arrivalTime = formatTime24(dateObj.getUTCHours(), dateObj.getUTCMinutes());
             } else { newE.arrivalTime = "12:00"; }
          } catch(err) { newE.arrivalTime = "12:00"; }
      } else if (typeof newE.arrivalTime !== 'string' || newE.arrivalTime.includes('NaN')) {
          newE.arrivalTime = "12:00";
      }
      if (isNaN(Number(newE.duration))) newE.duration = 60;
      if (isNaN(Number(newE.transitToNext))) newE.transitToNext = 30;
      if (isNaN(Number(newE.cost))) newE.cost = 0;
      map.set(newE.id, newE); 
    } 
  });
  return Array.from(map.values());
};

const recalculateTimes = (events) => {
    for (let i = 0; i < events.length - 1; i++) {
        const current = events[i];
        const dep = addMinutes(current.arrivalTime, current.duration);
        const nextArr = addMinutes(dep, current.transitToNext || 0);
        if (!events[i+1].isPinned) events[i+1].arrivalTime = nextArr;
    }
};

// ==========================================
// 3. 資料與 API 邏輯
// ==========================================
const saveData = () => {
    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify({ days: state.days, backups: state.backups }));
    
    // 如果有設定 API，同步推送到 Google Sheets
    if (state.sheetsApiUrl && state.sheetsApiUrl.trim() !== '') {
        state.syncStatus = 'saving';
        renderHeader(); // 更新 Header 狀態
        
        fetch(state.sheetsApiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ days: state.days, backups: state.backups })
        }).then(() => {
            state.syncStatus = 'synced';
            renderHeader();
        }).catch(e => {
            state.syncStatus = 'error';
            renderHeader();
        });
    } else {
        state.syncStatus = 'error'; // 顯示本地儲存圖示
        renderHeader();
    }
};

const loadData = async () => {
    const localDataStr = localStorage.getItem(LOCAL_STORAGE_KEY);
    if (localDataStr) {
        try {
            const localData = JSON.parse(localDataStr);
            if (localData.days && localData.days.length > 0) {
                state.days = localData.days.map(d => ({ ...d, events: sanitizeEvents(d.events) }));
                state.backups = sanitizeEvents(localData.backups || []);
            } else {
                state.days = INITIAL_DAYS;
            }
        } catch (e) { state.days = INITIAL_DAYS; }
    } else {
        state.days = INITIAL_DAYS;
    }
    
    state.activeDayId = state.days[0]?.id;

    if (state.sheetsApiUrl && state.sheetsApiUrl.trim() !== '') {
        try {
            state.syncStatus = 'saving';
            renderApp();
            const res = await fetch(state.sheetsApiUrl);
            const text = await res.text();
            let apiData = JSON.parse(text);
            if (apiData.days && apiData.days.length > 0) {
                const sortedDays = [...apiData.days].sort((a, b) => String(a.id).localeCompare(String(b.id)));
                state.days = sortedDays.map(d => ({ ...d, events: sanitizeEvents(d.events) }));
                state.backups = sanitizeEvents(apiData.backups || []);
                showToast("✅ 已成功載入試算表最新資料！");
                state.activeDayId = state.days[0]?.id;
                state.syncStatus = 'synced';
            }
        } catch (err) {
            showToast("⚠️ API 讀取失敗，已載入本地上次進度。");
            state.syncStatus = 'error';
        }
    }
    renderApp();
};

const forceWriteToApi = async () => {
    if (!state.sheetsApiUrl) {
      showToast("⚠️ 請先至右上角設定中綁定 API 網址");
      appActions.openModal();
      return;
    }
    state.syncStatus = 'saving';
    renderHeader();
    try {
      await fetch(state.sheetsApiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ days: state.days, backups: state.backups })
      });
      showToast("✅ 強制覆蓋成功！已將目前的行程備份至試算表");
      state.syncStatus = 'synced';
    } catch (err) {
      showToast(`❌ 覆蓋失敗：${err.message}`);
      state.syncStatus = 'error';
    }
    renderHeader();
};

// ==========================================
// 4. 互動操作邏輯 (Actions)
// ==========================================
const appActions = {
    toggleTheme: () => {
        state.isDarkMode = !state.isDarkMode;
        if (state.isDarkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        renderHeader();
    },
    setActiveDay: (id) => {
        state.activeDayId = id;
        renderDaysNav();
        renderTimeline();
        renderSummary();
        lucide.createIcons();
    },
    addNewDay: () => {
      let newDateId = `day-${Date.now()}`;
      let newLabel = "新行程";
      if (state.days.length > 0) {
        let lastValidDate = null;
        for (let i = state.days.length - 1; i >= 0; i--) {
          const labelMatch = String(state.days[i].label).match(/(\d{1,2})\/(\d{1,2})/);
          if (labelMatch) {
            let y = new Date().getFullYear();
            const idMatch = String(state.days[i].id).match(/^(\d{4})/);
            if (idMatch) y = Number(idMatch[1]);
            const d = new Date(y, Number(labelMatch[1]) - 1, Number(labelMatch[2]));
            if (!isNaN(d.getTime())) { lastValidDate = d; break; }
          }
        }
        if (lastValidDate) {
          lastValidDate.setDate(lastValidDate.getDate() + 1);
          newDateId = `${lastValidDate.getFullYear()}-${String(lastValidDate.getMonth() + 1).padStart(2, '0')}-${String(lastValidDate.getDate()).padStart(2, '0')}`;
          newLabel = `${String(lastValidDate.getMonth() + 1).padStart(2, '0')}/${String(lastValidDate.getDate()).padStart(2, '0')} 新行程`;
        }
      }
      state.days.push({ id: newDateId, label: newLabel, events: [] });
      state.activeDayId = newDateId;
      saveData();
      renderApp();
      showToast("✅ 已新增一天行程");
    },
    deleteDay: (id, event) => {
        event.stopPropagation();
        if (state.days.length <= 1) return showToast("⚠️ 至少需要保留一天行程！");
        state.days = state.days.filter(d => d.id !== id);
        if (state.activeDayId === id) state.activeDayId = state.days[0].id;
        saveData();
        renderApp();
    },
    // 輸入框失焦時才處理更新，防止吃字
    handleInputBlur: (eventId, field, inputEl) => {
        let value = inputEl.value;
        const dayIdx = state.days.findIndex(d => d.id === state.activeDayId);
        if (dayIdx === -1) return;
        const evIdx = state.days[dayIdx].events.findIndex(e => e.id === eventId);
        if (evIdx === -1) return;

        let ev = state.days[dayIdx].events[evIdx];

        if (field === 'arrivalTime') {
             const numbersOnly = String(value).replace(/\D/g, '');
             let formattedTime = "12:00";
             if (numbersOnly.length > 0) {
                let h = 0, m = 0;
                if (numbersOnly.length <= 2) h = parseInt(numbersOnly, 10);
                else if (numbersOnly.length === 3) {
                   h = parseInt(numbersOnly.substring(0, 1), 10);
                   m = parseInt(numbersOnly.substring(1, 3), 10);
                } else {
                   h = parseInt(numbersOnly.substring(0, 2), 10);
                   m = parseInt(numbersOnly.substring(2, 4), 10);
                }
                h = Math.min(h, 23);
                m = Math.min(m, 59);
                formattedTime = formatTime24(h, m);
             }
             ev.arrivalTime = formattedTime;
             ev.isPinned = true;
             inputEl.value = formattedTime; // 更新 UI
         } else if (field === 'duration' || field === 'transitToNext' || field === 'cost') {
             const defaultVal = field === 'duration' ? 60 : field === 'transitToNext' ? 30 : 0;
             ev[field] = (value === '' || isNaN(Number(value))) ? defaultVal : Number(value);
             inputEl.value = ev[field] === 0 ? '' : ev[field];
         }

        recalculateTimes(state.days[dayIdx].events);
        saveData();
        // 重新渲染時間軸與總計
        renderTimeline();
        renderSummary();
        lucide.createIcons();
    },
    togglePin: (eventId) => {
        const day = state.days.find(d => d.id === state.activeDayId);
        const ev = day.events.find(e => e.id === eventId);
        if(ev) ev.isPinned = !ev.isPinned;
        recalculateTimes(day.events);
        saveData();
        renderTimeline();
        lucide.createIcons();
    },
    cycleTransitMode: (eventId, currentMode) => {
        const modes = ['train', 'bus', 'car', 'walk'];
        const nextIdx = (modes.indexOf(currentMode || 'train') + 1) % modes.length;
        const day = state.days.find(d => d.id === state.activeDayId);
        const ev = day.events.find(e => e.id === eventId);
        if(ev) ev.transitMode = modes[nextIdx];
        saveData();
        renderTimeline();
        lucide.createIcons();
    },
    moveEventPosition: (eventId, direction) => {
        const day = state.days.find(d => d.id === state.activeDayId);
        const idx = day.events.findIndex(e => e.id === eventId);
        if (idx < 0) return;
        const newIdx = idx + direction;
        if (newIdx < 0 || newIdx >= day.events.length) return;

        const temp = day.events[idx];
        day.events[idx] = day.events[newIdx];
        day.events[newIdx] = temp;
        
        recalculateTimes(day.events);
        saveData();
        renderTimeline();
        lucide.createIcons();
    },
    deleteEvent: (eventId, isBackup = false) => {
        if (isBackup) {
            state.backups = state.backups.filter(b => b.id !== eventId);
            saveData();
            renderBackups();
            lucide.createIcons();
            return;
        }
        const day = state.days.find(d => d.id === state.activeDayId);
        day.events = day.events.filter(e => e.id !== eventId);
        recalculateTimes(day.events);
        saveData();
        renderTimeline();
        renderSummary();
        lucide.createIcons();
    },
    toggleCheck: (eventId, el) => {
        let shouldCelebrate = false;
        const day = state.days.find(d => d.id === state.activeDayId);
        const ev = day.events.find(e => e.id === eventId);
        if(ev) {
            ev.isChecked = !ev.isChecked;
            if (ev.isChecked) shouldCelebrate = true;
        }
        if (shouldCelebrate && window.confetti) {
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#4f46e5', '#10b981', '#f59e0b'] });
        }
        saveData();
        renderTimeline();
        lucide.createIcons();
    },
    moveToBackup: (eventId) => {
        const day = state.days.find(d => d.id === state.activeDayId);
        const ev = day.events.find(e => e.id === eventId);
        if(ev) {
            day.events = day.events.filter(e => e.id !== eventId);
            recalculateTimes(day.events);
            if (!state.backups.some(b => b.id === ev.id)) {
                state.backups.push({ ...ev, arrivalTime: '', duration: 60, transitToNext: 0, isPinned: false });
            }
            showToast(`已將「${ev.title}」移至備選`);
            saveData();
            renderApp(); // 更新備選數量
        }
    },
    moveToItinerary: (eventId) => {
        const ev = state.backups.find(b => b.id === eventId);
        if(ev) {
            state.backups = state.backups.filter(b => b.id !== eventId);
            const day = state.days.find(d => d.id === state.activeDayId);
            if (!day.events.some(e => e.id === ev.id)) {
                day.events.push({ ...ev, arrivalTime: '12:00', duration: 60, transitToNext: 30, transitMode: 'train', isPinned: false });
                day.events.sort((a, b) => a.arrivalTime.localeCompare(b.arrivalTime));
                recalculateTimes(day.events);
            }
            showToast(`已將「${ev.title}」加入今日行程`);
            state.showBackupMenu = false;
            saveData();
            renderApp();
        }
    },
    exportToImage: () => {
        const element = document.getElementById('itinerary-timeline');
        if (!element) return;
        showToast("📸 正在產生行程圖片...");
        html2canvas(element, { backgroundColor: state.isDarkMode ? '#0f172a' : '#f8fafc', scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            const day = state.days.find(d => d.id === state.activeDayId);
            link.download = `行程表-${day?.label}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast("✅ 圖片已成功下載！");
        }).catch(e => showToast("❌ 產生圖片失敗"));
    },
    openMap: (titleKr, title, type) => {
        const q = encodeURIComponent(titleKr || title);
        window.open(type === 'google' ? `https://www.google.com/maps/search/?api=1&query=${q}` : `https://map.naver.com/v5/search/${q}`, '_blank');
    },
    openDetails: (eventId) => {
        const day = state.days.find(d => d.id === state.activeDayId);
        state.selectedEvent = day.events.find(e => e.id === eventId) || state.backups.find(b => b.id === eventId);
        state.view = 'details';
        state.analysisContent = '';
        renderApp();
    },
    closeDetails: () => {
        state.view = 'itinerary';
        state.selectedEvent = null;
        renderApp();
    },
    generateDetailsAi: async () => {
        if(!state.selectedEvent) return;
        state.isDetailLoading = true;
        renderDetails();
        try {
            const res = await fetchAiAnalysis(`請詳細介紹「${state.selectedEvent.title}」(${state.selectedEvent.titleKr}) 的文化背景、最佳遊玩動線、攝影打卡點、適合的交通方式以及周邊推薦小吃。`);
            state.analysisContent = res;
        } catch (e) {
            state.analysisContent = "分析失敗，請重試。";
        } finally {
            state.isDetailLoading = false;
            renderDetails();
        }
    },
    handleAiAnalyze: async () => {
        const queryEl = document.getElementById('ai-query-input');
        const query = queryEl.value.trim();
        if(!query) return;
        
        state.isAiLoading = true;
        state.aiSuggestions = [];
        renderAiBox();

        try {
          const prompt = `請解析以下使用者的旅遊需求：「${query}」。提取出地點回傳JSON陣列：[{title:"地點", titleKr:"韓文", type:"景點/餐廳/小吃", arrivalTime:"14:00", duration:60, location:"區域"}]。只能回傳純 JSON 陣列，不要加入 Markdown。`;
          const payload = {
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { responseMimeType: "application/json" }
          };

          const data = await fetchGeminiWithBackoff(payload);
          const textStr = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!textStr) throw new Error('AI 回傳空值');

          const match = textStr.match(/\[[\s\S]*\]/);
          const jsonStr = match ? match[0] : textStr;
          const parsed = JSON.parse(jsonStr);
          const results = Array.isArray(parsed) ? parsed : [parsed];
          
          let targetDay = state.days.find(d => d.id === state.activeDayId) || state.days[0];
          state.days.forEach(d => {
            const dateKey = d.label.split(' ')[0].replace('/', '');
            if (query.includes(dateKey) || query.includes(d.label.split(' ')[0])) targetDay = d;
          });

          state.aiSuggestions = results.map(item => ({
            id: generateId(), 
            title: item.title || '新行程',
            titleKr: item.titleKr || '',
            type: item.type || '景點',
            location: item.location || item.title || '',
            arrivalTime: item.arrivalTime || '14:00',
            duration: item.duration || 60,
            transitToNext: 30,
            transitMode: 'train',
            cost: 0,
            isPinned: false,
            targetDayId: targetDay.id,
            targetDayLabel: targetDay.label,
            notes: '由 AI 推薦解析'
          }));
          queryEl.value = '';
        } catch (error) {
          showToast("⚠️ AI 解析失敗或網路異常，請稍後再試。");
        } finally {
          state.isAiLoading = false;
          renderAiBox();
        }
    },
    acceptAiSuggestion: (id, targetDayId) => {
        const sug = state.aiSuggestions.find(s => s.id === id);
        if(sug) {
            state.aiSuggestions = state.aiSuggestions.filter(s => s.id !== id);
            const day = state.days.find(d => d.id === targetDayId);
            if(day) {
                day.events.push({...sug});
                day.events.sort((a, b) => a.arrivalTime.localeCompare(b.arrivalTime));
                recalculateTimes(day.events);
                saveData();
                renderApp();
                showToast("✅ 已加入行程");
            }
        }
    },
    backupAiSuggestion: (id) => {
        const sug = state.aiSuggestions.find(s => s.id === id);
        if(sug) {
            state.aiSuggestions = state.aiSuggestions.filter(s => s.id !== id);
            state.backups.push({...sug, arrivalTime: '', cost: 0});
            saveData();
            renderApp();
            showToast(`已將「${sug.title}」收錄至備選`);
        }
    },
    openModal: () => { state.showIntegrationModal = true; renderModal(); },
    closeModal: () => { state.showIntegrationModal = false; renderModal(); },
    openBackup: () => { state.showBackupMenu = true; renderBackups(); },
    closeBackup: () => { state.showBackupMenu = false; renderBackups(); },
    saveApiUrl: () => {
        const input = document.getElementById('api-url-input');
        state.sheetsApiUrl = input.value;
        localStorage.setItem('korea_trip_api_url', state.sheetsApiUrl);
        showToast("✅ API 網址已儲存！");
        state.showIntegrationModal = false;
        saveData();
        renderModal();
    },
    setDefaultApi: () => {
        document.getElementById('api-url-input').value = DEFAULT_API_URL;
    },
    // --- 拖曳事件 ---
    dragStart: (e, id) => {
        state.draggedEventId = id;
        e.dataTransfer.setData('text/plain', id);
        const cardElement = e.target.closest('.group');
        if (cardElement) {
            e.dataTransfer.setDragImage(cardElement, 20, 20);
            setTimeout(() => cardElement.classList.add('opacity-50'), 0);
        }
    },
    dragOver: (e) => e.preventDefault(),
    drop: (e, targetId) => {
        e.preventDefault();
        const sourceId = e.dataTransfer.getData('text/plain');
        if (sourceId && sourceId !== targetId) appActions.moveEventPosition(sourceId, 0); // Tricky: move logic is complex, rewrite
        // Implement full reorder logic here for drop
        const day = state.days.find(d => d.id === state.activeDayId);
        const sIdx = day.events.findIndex(x => x.id === sourceId);
        const tIdx = day.events.findIndex(x => x.id === targetId);
        if(sIdx > -1 && tIdx > -1) {
            const [moved] = day.events.splice(sIdx, 1);
            day.events.splice(tIdx, 0, moved);
            recalculateTimes(day.events);
            saveData();
            renderTimeline();
            lucide.createIcons();
        }
        document.querySelectorAll('.opacity-50').forEach(el => el.classList.remove('opacity-50'));
    }
};

                          <button onclick="appActions.openMap('${escapeHTML(ev.titleKr)}', '${escapeHTML(ev.title)}', 'google')" class="text-slate-400 hover:text-blue-500 bg-slate-50 dark:bg-slate-800 p-1.5 rounded-lg transition-colors"><i data-lucide="map-icon" class="w-3.5 h-3.5"></i></button>

                  <div class="flex items-center ml-[44px] py-3 relative z-20">
                     <div class="bg-white dark:bg-slate-900 px-3 py-1.5 rounded-full flex items-center gap-2 border border-slate-200 dark:border-slate-700 shadow-sm text-slate-600 dark:text-slate-400 text-xs font-bold hover:border-indigo-300 transition-colors">
                        <button onclick="appActions.cycleTransitMode('${ev.id}', '${ev.transitMode}')" class="p-1 hover:bg-indigo-50 dark:hover:bg-indigo-900 rounded-full transition-colors text-indigo-500" title="切換交通方式">

            </div>
            <div class="p-6 space-y-4 overflow-y-auto pb-20 no-scrollbar flex-1">
               ${state.backups.map(b => `
                 <div class="p-4 bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-3xl flex gap-4 hover:shadow-md transition-all">
                   <img src="https://picsum.photos/seed/${b.id}/80/80" alt="備選" class="w-16 h-16 rounded-xl object-cover" />
                   <div class="flex-1 min-w-0">
                     <div class="flex justify-between items-start mb-1">
                        <span class="px-2 py-0.5 rounded text-[10px] font-bold border bg-blue-50 text-blue-600 border-blue-100 dark:bg-blue-900/30 dark:border-blue-800">MEMO</span>
                        <button onclick="appActions.deleteEvent('${b.id}', true)" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                     </div>
                     <h4 class="font-bold text-slate-800 dark:text-white text-base truncate">${escapeHTML(b.title)}</h4>
                     <button onclick="appActions.moveToItinerary('${b.id}')" class="mt-2 text-xs text-indigo-600 dark:text-indigo-400 font-bold flex items-center gap-1 hover:opacity-80"><i data-lucide="plus" class="w-3.5 h-3.5"></i> 加入行程</button>
                   </div>
                 </div>
               `).join('')}
               ${state.backups.length === 0 ? `<div class="text-center py-12 text-slate-300 dark:text-slate-600 font-bold italic">目前沒有備選地點</div>` : ''}
            </div>
         </div>
      </div>
    `;
    const el = document.getElementById('backups-container');
    if(el) el.innerHTML = html;
    return html;
}

function renderModal() {
    const html = state.showIntegrationModal ? `
        <div class="fixed inset-0 bg-slate-900/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
          <div class="bg-white dark:bg-slate-900 rounded-[32px] w-full max-w-lg p-6 shadow-2xl animate-in zoom-in-95">
            <div class="flex justify-between items-center mb-6">
              <h3 class="text-xl font-black flex items-center gap-2 text-slate-800 dark:text-white"><i data-lucide="database" class="text-indigo-500"></i> 資料整合設定</h3>
              <button onclick="appActions.closeModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="space-y-5">
              <div class="bg-slate-50 dark:bg-slate-800 p-5 rounded-2xl border border-slate-100 dark:border-slate-700">
                 <h4 class="font-bold text-slate-800 dark:text-white mb-1 flex items-center gap-2"><i data-lucide="link" class="w-4 h-4"></i> API 雙向同步 (進階)</h4>
                 <p class="text-xs text-slate-500 dark:text-slate-400 mb-3">設定 Google Apps Script 網址。APP 每次開啟將自動拉取，修改後也可推回試算表作為永久備份。</p>
                 <input id="api-url-input" value="${state.sheetsApiUrl}" placeholder="https://script.google.com/macros/s/.../exec" class="w-full bg-white dark:bg-slate-950 dark:text-white border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-xs outline-none focus:ring-2 focus:ring-indigo-500 mb-3" />
                 <div class="flex gap-2">
                    <button onclick="appActions.saveApiUrl()" class="flex-1 bg-slate-800 dark:bg-indigo-600 text-white py-2.5 rounded-xl font-bold text-sm shadow-md hover:bg-slate-700 dark:hover:bg-indigo-700 transition-colors">儲存並自動讀取</button>
                    <button onclick="appActions.setDefaultApi()" class="px-4 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300 py-2.5 rounded-xl font-bold text-sm shadow-sm hover:bg-slate-300 dark:hover:bg-slate-600 transition-colors whitespace-nowrap">帶入預設</button>
                 </div>
              </div>
            </div>
          </div>
        </div>
    ` : '';
    const el = document.getElementById('modal-container');
    if(el) el.innerHTML = html;
    return html;
}

function renderDetails() {
    if (state.view !== 'details' || !state.selectedEvent) return '';
    const ev = state.selectedEvent;
    
    return `
      <div class="min-h-screen bg-white dark:bg-slate-950 font-sans text-slate-800 dark:text-slate-200 animate-in fade-in duration-300 relative z-[70]">
        <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100 dark:border-slate-800 p-4 flex items-center justify-between">
          <button onclick="appActions.closeDetails()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
          <h2 class="text-xl font-bold">景點攻略</h2>
          <div class="w-8"></div>
        </header>
        <main class="max-w-2xl mx-auto px-4 py-8 space-y-8 pb-20">
          <div class="bg-slate-50 dark:bg-slate-900 rounded-3xl p-6 border border-slate-100 dark:border-slate-800 shadow-sm text-center relative overflow-hidden">
             <img src="https://picsum.photos/seed/${ev.id}/800/400" alt="cover" class="absolute inset-0 w-full h-full object-cover opacity-20 mix-blend-overlay pointer-events-none" />
             <div class="relative z-10">
               <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white mb-2">${escapeHTML(ev.title)}</h1>
               <p class="text-indigo-600 dark:text-indigo-400 font-bold text-lg mb-6">${escapeHTML(ev.titleKr)}</p>
               <button onclick="appActions.generateDetailsAi()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all">
                  ${state.isDetailLoading ? '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>' : '<i data-lucide="sparkles" class="w-5 h-5"></i>'}
                  ${state.isDetailLoading ? "正在為您撰寫攻略..." : "AI 生成深入攻略"}
               </button>
             </div>
          </div>
          ${state.analysisContent ? `
            <div class="prose prose-slate dark:prose-invert max-w-none bg-slate-50 dark:bg-slate-900 rounded-3xl p-6 border border-slate-100 dark:border-slate-800 shadow-inner animate-in slide-in-from-bottom-4">
              <div class="text-slate-700 dark:text-slate-300 leading-relaxed whitespace-pre-wrap">${escapeHTML(state.analysisContent)}</div>
            </div>
          ` : ''}
        </main>
      </div>
    `;
}

function renderApp() {
    if (state.view === 'details') {
        root.innerHTML = renderDetails();
        lucide.createIcons();
        return;
    }

    root.innerHTML = `
        <div id="header-container"></div>
        <main class="max-w-2xl mx-auto px-4 py-6 space-y-6">
            <div id="ai-box-container"></div>
            <div id="days-nav-container"></div>
            <div id="summary-container"></div>
            <div id="timeline-container"></div>
        </main>
        <div id="modal-container"></div>
        <div id="backups-container"></div>
    `;
    
    renderHeader();
    renderAiBox();
    renderDaysNav();
    renderSummary();
    renderTimeline();
    renderModal();
    renderBackups();
    lucide.createIcons();
}

// 啟動 App
window.onload = () => {
    loadData();
};
</script>
</body>
</html>
